services:
  gym-ai-trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gym-ai-trainer
    restart: unless-stopped
    env_file: .env
    volumes:
      # Bind-mount agent data directory for persistence
      - ../agent/data:/app/data
      # Bind-mount agent .env file (HEVY_API_KEY, LLM provider keys)
      - ../agent/.env:/app/.env:ro
